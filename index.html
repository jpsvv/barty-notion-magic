    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Barty",
      "url": "https://barty.fun",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Sistema cashless para eventos, festivais, feiras e estabelecimentos. Venda antecipada por item, pagamento Pix e cartão, retirada via QR Code e relatórios em tempo real. Alternativa sem custos fixos a soluções como Zig e Meep.",
      "offers": [
        {
          "@type": "Offer",
          "name": "Plano Eventos",
          "description": "Taxa de 3% sobre vendas processadas, sem mensalidade. Inclui setup grátis e migração de cardápios.",
          "price": "0",
          "priceCurrency": "BRL",
          "availability": "https://schema.org/InStock"
        },
        {
          "@type": "Offer",
          "name": "Plano Estabelecimentos",
          "description": "R$99/mês com pedidos ilimitados e analytics premium para restaurantes e bares.",
          "priceCurrency": "BRL",
          "price": "99",
          "availability": "https://schema.org/InStock"
        }
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "200",
        "bestRating": "5"
      },
      "author": {
        "@type": "Organization",
        "name": "Barty",
        "url": "https://barty.fun"
      }
    }
    </script>

    <!-- JSON-LD: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "O cliente precisa baixar algum aplicativo para usar o Barty?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Não. O Barty funciona 100% pelo navegador do celular. O cliente aponta a câmera para o QR Code, o cardápio abre instantaneamente — sem cadastro, sem download, sem atrito."
          }
        },
        {
          "@type": "Question",
          "name": "Como o pedido chega para a cozinha?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Após o pagamento confirmado, o pedido aparece automaticamente no painel da cozinha (funciona em qualquer tablet, computador ou celular). Você pode imprimir o pedido ou exibir na tela."
          }
        },
        {
          "@type": "Question",
          "name": "O Barty funciona para eventos com grande público?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. Nossa infraestrutura foi desenhada para lidar com picos de acesso. Festivais, formaturas, eventos corporativos — já processamos centenas de pedidos simultâneos sem instabilidade."
          }
        },
        {
          "@type": "Question",
          "name": "Qual a diferença entre o Barty e sistemas como Zig, Meep ou Imply?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Simplicidade e custo real. Soluções como Zig e Imply são voltadas para grandes produtoras com equipe de TI e orçamento alto. O Barty foi feito para quem precisa vender mais amanhã de manhã, sem depender de técnico, contrato de 12 meses ou hardware caro. Você imprime o QR Code e começa."
          }
        },
        {
          "@type": "Question",
          "name": "Posso personalizar o cardápio com fotos e promoções?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. Você adiciona fotos, descrições, variações (ex.: tamanho, ponto da carne), preços e promoções diretamente no painel. Mudanças aparecem em tempo real para o cliente."
          }
        },
        {
          "@type": "Question",
          "name": "Como funciona o repasse dos pagamentos?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "O dinheiro cai diretamente na sua conta. Não somos intermediários financeiros — integramos com seu gateway de pagamento preferido. Pix é confirmado em segundos."
          }
        },
        {
          "@type": "Question",
          "name": "Tem fidelidade ou contrato mínimo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Para o plano de eventos, é uso por demanda — sem contrato. Para estabelecimentos fixos, mensalidade sem fidelidade obrigatória. Cancele quando quiser, sem multa."
          }
        }
      ]
    }
    </script>
  </head>
