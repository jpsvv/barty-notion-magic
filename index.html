    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Barty",
      "url": "https://barty.fun",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Cardápio digital com QR Code para restaurantes, bares e eventos. Pedidos online, pagamento Pix e cartão, acompanhamento em tempo real.",
      "offers": [
        {
          "@type": "Offer",
          "name": "Plano Eventos",
          "description": "Taxa por transação, sem mensalidade. Ideal para eventos.",
          "price": "0",
          "priceCurrency": "BRL",
          "availability": "https://schema.org/InStock"
        },
        {
          "@type": "Offer",
          "name": "Plano Estabelecimentos",
          "description": "Mensalidade fixa com pedidos ilimitados para restaurantes e bares.",
          "priceCurrency": "BRL",
          "availability": "https://schema.org/InStock"
        }
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "200",
        "bestRating": "5"
      },
      "author": {
        "@type": "Organization",
        "name": "Barty",
        "url": "https://barty.fun"
      }
    }
    </script>

    <!-- JSON-LD: FAQ (GEO + Featured Snippets) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "O que é o Barty?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Barty é um cardápio digital com QR Code que permite aos clientes fazerem pedidos e pagamentos diretamente pelo celular, sem precisar baixar nenhum aplicativo. Funciona para restaurantes, bares, cafeterias e eventos."
          }
        },
        {
          "@type": "Question",
          "name": "Como funciona o cardápio digital do Barty?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "O cliente escaneia um QR Code na mesa, acessa o cardápio digital no navegador do celular, monta o pedido, paga com Pix ou cartão e acompanha o preparo em tempo real. Tudo sem instalar app e sem precisar de atendente."
          }
        },
        {
          "@type": "Question",
          "name": "Quanto custa o Barty?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "O Barty oferece dois modelos: para Eventos, sem custo fixo (paga apenas uma taxa por transação); e para Estabelecimentos, com mensalidade fixa e pedidos ilimitados. O teste é grátis, sem cartão de crédito."
          }
        },
        {
          "@type": "Question",
          "name": "O cliente precisa baixar algum aplicativo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Não. O Barty funciona 100% no navegador do celular. Basta escanear o QR Code e o cardápio abre automaticamente, sem download, sem cadastro."
          }
        },
        {
          "@type": "Question",
          "name": "Quais formas de pagamento o Barty aceita?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "O Barty aceita pagamento via Pix, cartão de crédito e cartão de débito, tudo integrado diretamente no pedido digital."
          }
        },
        {
          "@type": "Question",
          "name": "O Barty funciona para eventos?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. O Barty tem um plano específico para eventos com setup em minutos, sem custo fixo e suporte dedicado durante o evento."
          }
        }
      ]
    }
    </script>
